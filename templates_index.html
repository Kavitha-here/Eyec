<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Clinic Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            animation: slideUp 0.6s ease;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        input[type="number"],
        input[type="range"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus,
        input[type="range"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input[type="range"] {
            height: 8px;
            cursor: pointer;
            padding: 0;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .radius-display {
            color: #667eea;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .clinics-container {
            display: grid;
            gap: 20px;
        }
        
        .clinic-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
            border-left: 5px solid #667eea;
        }
        
        .clinic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        
        .clinic-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .clinic-name {
            font-size: 1.4em;
            color: #333;
            font-weight: 700;
        }
        
        .clinic-distance {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .rating {
            display: inline-block;
            background: #ffc107;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9em;
        }
        
        .clinic-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.95em;
        }
        
        .info-item {
            color: #666;
        }
        
        .info-label {
            font-weight: 600;
            color: #333;
        }
        
        .specialties {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .specialty-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.1em;
            padding: 20px;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }
        
        .success-message {
            background: #51cf66;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }
        
        .no-results {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            color: #666;
            font-size: 1.1em;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .input-row {
                grid-template-columns: 1fr;
            }
            
            .clinic-info {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👁️ Eye Clinic Finder</h1>
            <p>Discover nearby eye clinics in your area</p>
        </header>
        
        <div class="search-box">
            <div class="form-group">
                <label>Your Location</label>
                <div class="input-row">
                    <div>
                        <label style="font-size: 0.85em; font-weight: 500;">Latitude</label>
                        <input type="number" id="latitude" placeholder="e.g., 40.7128" step="0.0001">
                    </div>
                    <div>
                        <label style="font-size: 0.85em; font-weight: 500;">Longitude</label>
                        <input type="number" id="longitude" placeholder="e.g., -74.0060" step="0.0001">
                    </div>
                    <div>
                        <label style="font-size: 0.85em; font-weight: 500;">&nbsp;</label>
                        <button class="btn-secondary" onclick="getLocation()" style="margin-top: 0;">📍 Auto-Detect</button>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Search Radius: <span class="radius-display" id="radiusDisplay">10 km</span></label>
                <input type="range" id="radius" min="1" max="50" value="10" oninput="updateRadiusDisplay()">
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="findClinics()">🔍 Find Clinics</button>
                <button class="btn-secondary" onclick="resetForm()">🔄 Reset</button>
            </div>
        </div>
        
        <div id="messageContainer"></div>
        <div id="clinicsContainer" class="clinics-container"></div>
    </div>
    
    <script>
        function updateRadiusDisplay() {
            const radius = document.getElementById('radius').value;
            document.getElementById('radiusDisplay').textContent = radius + ' km';
        }
        
        function getLocation() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('latitude').value = position.coords.latitude.toFixed(4);
                        document.getElementById('longitude').value = position.coords.longitude.toFixed(4);
                        hideLoading();
                        showMessage('Location detected successfully!', 'success');
                    },
                    function(error) {
                        hideLoading();
                        showMessage('Unable to detect location. Please enter manually.', 'error');
                    }
                );
            } else {
                showMessage('Geolocation is not supported by your browser.', 'error');
            }
        }
        
        function findClinics() {
            const latitude = parseFloat(document.getElementById('latitude').value);
            const longitude = parseFloat(document.getElementById('longitude').value);
            const radius = parseFloat(document.getElementById('radius').value);
            
            if (isNaN(latitude) || isNaN(longitude)) {
                showMessage('Please enter valid coordinates or use auto-detect.', 'error');
                return;
            }
            
            showLoading();
            
            fetch('/api/nearby-clinics', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    lat: latitude,
                    lon: longitude,
                    radius: radius
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                displayClinics(data, radius);
            })
            .catch(error => {
                hideLoading();
                showMessage('Error finding clinics. Please try again.', 'error');
                console.error('Error:', error);
            });
        }
        
        function displayClinics(clinics, radius) {
            const container = document.getElementById('clinicsContainer');
            container.innerHTML = '';
            
            if (clinics.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <p>No eye clinics found within ${radius} km. Try increasing the search radius!</p>
                    </div>
                `;
                return;
            }
            
            clinics.forEach((clinic, index) => {
                const card = document.createElement('div');
                card.className = 'clinic-card';
                card.style.animationDelay = (index * 0.1) + 's';
                
                const specialtiesHtml = clinic.specialties
                    .map(spec => `<span class="specialty-tag">${spec}</span>`)
                    .join('');
                
                card.innerHTML = `
                    <div class="clinic-header">
                        <div class="clinic-name">${clinic.name}</div>
                        <div class="clinic-distance">${clinic.distance} km away</div>
                    </div>
                    <div class="rating">⭐ ${clinic.rating}/5.0</div>
                    <div class="clinic-info">
                        <div class="info-item">
                            <span class="info-label">📍 Address:</span><br>
                            ${clinic.address}
                        </div>
                        <div class="info-item">
                            <span class="info-label">📞 Phone:</span><br>
                            ${clinic.phone}
                        </div>
                        <div class="info-item">
                            <span class="info-label">🕐 Hours:</span><br>
                            ${clinic.hours}
                        </div>
                    </div>
                    <div>
                        <span class="info-label">Specialties:</span>
                        <div class="specialties">${specialtiesHtml}</div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        function showLoading() {
            const container = document.getElementById('clinicsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Finding nearby clinics...</p></div>';
        }
        
        function hideLoading() {
            // Handled by displayClinics or error handling
        }
        
        function showMessage(message, type) {
            const messageContainer = document.getElementById('messageContainer');
            const className = type === 'error' ? 'error-message' : 'success-message';
            messageContainer.innerHTML = `<div class="${className}">${message}</div>`;
            setTimeout(() => {
                messageContainer.innerHTML = '';
            }, 5000);
        }
        
        function resetForm() {
            document.getElementById('latitude').value = '';
            document.getElementById('longitude').value = '';
            document.getElementById('radius').value = '10';
            updateRadiusDisplay();
            document.getElementById('clinicsContainer').innerHTML = '';
            document.getElementById('messageContainer').innerHTML = '';
        }
    </script>
</body>
</html>
