<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Clinic Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Eye Clinic Finder</h1>
    </header>
    <main>
        <section id="search">
            <h2>Find an Eye Clinic</h2>
            <form id="searchForm">
                <label for="location">Location:</label>
                <input type="text" id="location" name="location" required>
                <button type="submit">Search</button>
            </form>
        </section>
        <section id="results">
            <h2>Results</h2>
            <div id="clinicList"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Eye Clinic Finder</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
